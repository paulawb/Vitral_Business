version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456789}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    ports:
      - "${AUTH_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis

  catalogo:
    build:
      context: .
      dockerfile: catalogo/Dockerfile
    ports:
      - "${CATALOGO_PORT:-8081}:8081"
    depends_on:
      - postgres

  business:
    build:
      context: .
      dockerfile: business/Dockerfile
    ports:
      - "${BUSINESS_PORT:-8082}:8082"
    depends_on:
      - postgres

  booking:
    build:
      context: .
      dockerfile: booking/Dockerfile
    ports:
      - "${BOOKING_PORT:-8083}:8083"
    depends_on:
      - postgres
      - redis

  analytics:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    ports:
      - "${ANALYTICS_PORT:-8085}:8085"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_CATALOG_API_URL: ${NEXT_PUBLIC_CATALOG_API_URL:-http://localhost:8081}
        NEXT_PUBLIC_BUSINESS_API_URL: ${NEXT_PUBLIC_BUSINESS_API_URL:-http://localhost:8082}
        NEXT_PUBLIC_BOOKING_API_URL: ${NEXT_PUBLIC_BOOKING_API_URL:-http://localhost:8083}
        NEXT_PUBLIC_WHATSAPP_API_URL: ${NEXT_PUBLIC_WHATSAPP_API_URL:-http://localhost:8084}
        NEXT_PUBLIC_ANALYTICS_API_URL: ${NEXT_PUBLIC_ANALYTICS_API_URL:-http://localhost:8085}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - auth

volumes:
  postgres_data:
